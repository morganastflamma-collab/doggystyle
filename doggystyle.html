<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Project Progress</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    padding: 1rem;
  }
  .card {
    background: #FFD3C8;
    border-radius: 16px;
    padding: 2rem;
    max-width: 680px;
    margin: 0 auto;
  }
  .header { margin-bottom: 2rem; }
  .header-label {
    font-size: 11px;
    color: #7B7D34;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 4px;
  }
  .header-pct { display: flex; align-items: baseline; gap: 6px; }
  .header-pct .number { font-size: 36px; font-weight: 700; color: #7B7D34; line-height: 1; }
  .header-pct .label { font-size: 14px; font-weight: 700; color: #7B7D34; }
  .journey { position: relative; }
  .road-bg {
    position: absolute; top: 32px; left: 32px; right: 32px;
    height: 6px; background: rgba(123,125,52,0.15); border-radius: 3px; z-index: 0;
  }
  .road-fill {
    position: absolute; top: 32px; left: 32px;
    height: 6px; background: #7B7D34; border-radius: 3px; z-index: 0;
  }
  .nodes { display: flex; justify-content: space-between; align-items: flex-start; position: relative; z-index: 1; }
  .node { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 80px; }
  .node.active { width: 90px; margin-top: -10px; }
  .icon-wrap { border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .icon-wrap.done { width: 52px; height: 52px; background: #7B7D34; }
  .icon-wrap.current {
    width: 68px; height: 68px; background: #FFD3C8;
    border: 2.5px solid #7B7D34;
    box-shadow: 0 0 0 5px rgba(123,125,52,0.15);
  }
  .icon-wrap.pending { width: 52px; height: 52px; background: #FFD3C8; border: 1.5px dashed rgba(123,125,52,0.3); }
  .node-label { text-align: center; }
  .node-label .title { font-size: 11px; font-weight: 700; color: #7B7D34; margin-bottom: 2px; line-height: 1.3; }
  .node-label .title.pending { color: rgba(123,125,52,0.3); }
  .node-label .subtitle { font-size: 10px; font-weight: 500; color: rgba(123,125,52,0.65); margin-bottom: 6px; line-height: 1.3; }
  .node-label .subtitle.pending { color: rgba(123,125,52,0.2); }
  .bar-track { height: 4px; background: rgba(123,125,52,0.15); border-radius: 2px; width: 52px; }
  .bar-track.pending { background: rgba(123,125,52,0.08); }
  .bar-track.wide { width: 60px; }
  .bar-fill { height: 4px; background: #7B7D34; border-radius: 2px; }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <p class="header-label">Project Progress</p>
    <div class="header-pct">
      <span class="number" id="total-pct">60%</span>
      <span class="label">completed</span>
    </div>
  </div>

  <div class="journey">
    <div class="road-bg"></div>
    <div class="road-fill" id="road-fill"></div>
    <div class="nodes" id="nodes"></div>
  </div>
</div>

<script>
const icons = {
  search: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
  bulb: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 1 7 7c0 2.5-1.5 4.5-3 6H8c-1.5-1.5-3-3.5-3-6a7 7 0 0 1 7-7z"/></svg>`,
  palette: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>`,
  grid: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>`,
  rocket: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>`,
};

const iconsBig = {
  search: `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
  bulb: `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 1 7 7c0 2.5-1.5 4.5-3 6H8c-1.5-1.5-3-3.5-3-6a7 7 0 0 1 7-7z"/></svg>`,
  palette: `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>`,
  grid: `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>`,
  rocket: `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>`,
};

const phases = [
  { icon: 'search',  label: 'Onboarding',    sub: 'Brand Immersion',    pct: 100 },
  { icon: 'bulb',    label: '1st Cycle',      sub: 'Creative Direction', pct: 100 },
  { icon: 'palette', label: '2nd Cycle',      sub: 'Visual Identity',    pct: 100 },
  { icon: 'grid',    label: '3rd Cycle',      sub: 'Unfolding',          pct: 0   },
  { icon: 'rocket',  label: 'Final Delivery', sub: '',                   pct: 0   },
];

const total = Math.round(phases.reduce((s, p) => s + p.pct, 0) / phases.length);
document.getElementById('total-pct').textContent = total + '%';

const firstPending = phases.findIndex(ph => ph.pct < 100);
const lastDone = firstPending - 1;
const roadPct = lastDone >= 0 ? (lastDone / (phases.length - 1)) : 0;
document.getElementById('road-fill').style.width = `calc((100% - 64px) * ${roadPct})`;

const container = document.getElementById('nodes');
phases.forEach((p, i) => {
  const done     = p.pct === 100;
  const isCurrent = i === firstPending;
  const pending  = !done && !isCurrent;
  const iconState = done ? 'done' : isCurrent ? 'current' : 'pending';
  const iconSvg  = isCurrent ? iconsBig[p.icon] : icons[p.icon];
  const iconColor = done ? '#FFD3C8' : '#7B7D34';
  const iconOpacity = pending ? '0.25' : '1';

  const node = document.createElement('div');
  node.className = 'node' + (isCurrent ? ' active' : '');
  node.innerHTML = `
    <div class="icon-wrap ${iconState}" style="color:${iconColor};opacity:${iconOpacity};">
      ${iconSvg}
    </div>
    <div class="node-label">
      <p class="title${pending ? ' pending' : ''}">${p.label}</p>
      <p class="subtitle${pending ? ' pending' : ''}">${p.sub || '&nbsp;'}</p>
      <div class="bar-track${pending ? ' pending' : ''}${isCurrent ? ' wide' : ''}">
        ${!pending ? `<div class="bar-fill" style="width:${p.pct}%"></div>` : ''}
      </div>
    </div>
  `;
  container.appendChild(node);
});
</script>
</body>
</html>
